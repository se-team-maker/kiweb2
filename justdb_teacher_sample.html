<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>講師情報検索</title>
  <style>
    :root{
      --primary:#0C3C78;
      --primary-hover:#082F5E;
      --accent:#C1272D;
      --bg:#f6f8fb;
      --card:#ffffff;
      --border:#d9e1ea;
      --text:#1f2937;
      --soft:#6b7280;
      --ok-bg:#eef8f0;
      --ok-bd:#b7e0bf;
      --err-bg:#fff1f2;
      --err-bd:#fecdd3;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#f9fbff 0%,#f3f6fb 100%);
      color:var(--text);
    }
    .wrap{
      max-width:720px;
      margin:48px auto;
      padding:0 20px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 12px 30px rgba(12,60,120,.08);
      padding:28px;
    }
    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.3;
      color:var(--primary);
    }
    .lead{
      margin:0 0 24px;
      color:var(--soft);
      font-size:14px;
    }
    label{
      display:block;
      margin:0 0 8px;
      font-weight:700;
      font-size:14px;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 140px;
      gap:12px;
    }
    input[type="text"]{
      width:100%;
      height:48px;
      padding:0 14px;
      border:1px solid var(--border);
      border-radius:12px;
      font-size:16px;
      outline:none;
      background:#fff;
    }
    input[type="text"]:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(12,60,120,.12);
    }
    button{
      height:48px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{ background:var(--primary-hover); }
    button:disabled{
      opacity:.65;
      cursor:not-allowed;
    }
    .status{
      min-height:24px;
      margin-top:14px;
      font-size:14px;
      color:var(--soft);
    }
    .panel{
      margin-top:22px;
      padding:18px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fafcff;
      display:none;
    }
    .panel.show{
      display:block;
    }
    .panel.ok{
      background:var(--ok-bg);
      border-color:var(--ok-bd);
    }
    .panel.err{
      background:var(--err-bg);
      border-color:var(--err-bd);
    }
    .grid{
      display:grid;
      grid-template-columns:140px 1fr;
      gap:10px 14px;
      align-items:center;
    }
    .k{
      color:var(--soft);
      font-size:14px;
    }
    .v{
      font-size:18px;
      font-weight:700;
      letter-spacing:.02em;
      word-break:break-all;
    }
    .note{
      margin-top:20px;
      font-size:12px;
      color:var(--soft);
      line-height:1.7;
    }
    code{
      background:#f1f5f9;
      padding:2px 6px;
      border-radius:6px;
    }
    @media (max-width: 640px){
      .wrap{ margin:24px auto; }
      .card{ padding:20px; border-radius:16px; }
      h1{ font-size:24px; }
      .row{ grid-template-columns:1fr; }
      .grid{ grid-template-columns:110px 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>講師情報検索</h1>
      <p class="lead">
        講師名を入力して、ブリッジPHPから <code>講師番号</code> と <code>PIN</code> を取得します。
      </p>

      <label for="teacherName">講師名</label>
      <div class="row">
        <input id="teacherName" type="text" placeholder="例：真砂大朗" value="真砂大朗" />
        <button id="searchBtn" type="button">検索</button>
      </div>

      <div id="status" class="status"></div>

      <div id="resultPanel" class="panel">
        <div class="grid">
          <div class="k">講師名</div>
          <div id="viewName" class="v"></div>

          <div class="k">講師番号</div>
          <div id="viewKoshiNo" class="v"></div>

          <div class="k">PIN</div>
          <div id="viewPin" class="v"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const ENDPOINT = "https://system.kyotoijuku.com/kiweb/apis/justdb_teacher_bridge.php";

    const teacherNameInput = document.getElementById("teacherName");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultPanel = document.getElementById("resultPanel");
    const viewName = document.getElementById("viewName");
    const viewKoshiNo = document.getElementById("viewKoshiNo");
    const viewPin = document.getElementById("viewPin");

    function setStatus(message) {
      statusEl.textContent = message || "";
    }

    function showError(message) {
      resultPanel.className = "panel show err";
      viewName.textContent = teacherNameInput.value.trim() || "-";
      viewKoshiNo.textContent = "-";
      viewPin.textContent = "-";
      setStatus(message || "エラーが発生しました。");
    }

    function showResult(name, koshiNo, pin) {
      resultPanel.className = "panel show ok";
      viewName.textContent = name || "-";
      viewKoshiNo.textContent = koshiNo ?? "-";
      viewPin.textContent = pin ?? "-";
      setStatus("取得できました。");
    }

    async function searchTeacher() {
      const name = teacherNameInput.value.trim();

      if (!name) {
        showError("講師名を入力してください。");
        teacherNameInput.focus();
        return;
      }

      searchBtn.disabled = true;
      setStatus("検索中...");
      resultPanel.className = "panel";

      try {
        const url = `${ENDPOINT}?strName=${encodeURIComponent(name)}`;
        const res = await fetch(url, {
          method: "GET",
          headers: {
            "Accept": "application/json"
          }
        });

        let data;
        try {
          data = await res.json();
        } catch (jsonErr) {
          throw new Error("JSONとして解釈できない応答です。");
        }

        if (!res.ok) {
          throw new Error(data?.error || `HTTP ${res.status}`);
        }

        const { koshiNo, pin } = data;

        if (koshiNo == null && pin == null) {
          throw new Error("必要な値が返ってきませんでした。");
        }

        showResult(name, koshiNo, pin);
        console.log("取得結果:", data);
      } catch (err) {
        console.error(err);
        showError(err.message || "取得に失敗しました。");
      } finally {
        searchBtn.disabled = false;
      }
    }

    searchBtn.addEventListener("click", searchTeacher);
    teacherNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchTeacher();
      }
    });
  </script>
</body>
</html>
