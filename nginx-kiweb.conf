# nginx configuration for /kiweb/
# このファイルを既存のnginx設定に追加してください
# 
# 設定方法:
# 1. このファイルの内容を /etc/nginx/sites-available/ 内の設定ファイルに追加
# 2. または /etc/nginx/conf.d/ に配置
# 3. sudo nginx -t でテスト
# 4. sudo systemctl reload nginx で反映

# /kiweb/ ルートへのアクセスをログインページにリダイレクト
location = /kiweb/ {
    return 302 /kiweb/login/public/login.php;
}

location = /kiweb {
    return 302 /kiweb/login/public/login.php;
}

# ポータルHTMLは直接配信せず、必ずガード経由にする
location = /kiweb/kiweb2.html {
    return 302 /kiweb/teacher-auth/public/portal-guard.php;
}

location = /kiweb/kiweb2-fulltime.html {
    return 302 /kiweb/teacher-auth/public/portal-guard.php;
}

location = /kiweb/kiweb2-admin.html {
    return 302 /kiweb/teacher-auth/public/portal-guard.php;
}

# room-booking を room-booking.php に固定
location = /kiweb/room-booking {
    return 302 /kiweb/room-booking/room-booking.php;
}

location = /kiweb/room-booking/ {
    return 302 /kiweb/room-booking/room-booking.php;
}

# login/public/ 内のPHPファイルを処理
location /kiweb/login/public/ {
    # デフォルトインデックスファイル
    index index.php index.html;
    
    # PHPファイルの処理
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;  # PHP-FPMソケット（環境に合わせて変更）
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}

# login/api/ 内のPHPファイルを処理
location /kiweb/login/api/ {
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}

# teacher-auth/public/ 内のPHPファイルを処理
location /kiweb/teacher-auth/public/ {
    index index.php index.html;

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}

# teacher-auth/api/ 内のPHPファイルを処理
location /kiweb/teacher-auth/api/ {
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}

# room-booking の設定
location /kiweb/room-booking/ {
    index room-booking.php;
    try_files $uri $uri/ /kiweb/room-booking/room-booking.php;

    # PHPファイルの処理を追加
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

# .env, .htaccess, src, vendor, database, storage フォルダへのアクセスを禁止
location ~ /kiweb/login/(\.env|\.htaccess|src|vendor|database) {
    deny all;
    return 403;
}

location ~ /kiweb/teacher-auth/(\.env|\.htaccess|src|vendor|database|storage) {
    deny all;
    return 403;
}
