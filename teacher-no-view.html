<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>職員No（講師No）/確認key表示</title>
  <link rel="stylesheet" href="vendor/mdl/mdl-chip.css" />
  <style>
    :root {
      --bg: #f5f5f8;
      --text: #1a1a2e;
      --muted: #555;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.07);
      --radius: 16px;

      --staff-bg: #eef4ff;
      --staff-border: #b8cff0;
      --staff-accent: #1e56a0;
      --staff-chip-bg: #ddeaff;
      --staff-chip-border: #a4c4f4;

      --key-bg: #fff0f0;
      --key-border: #e8a0a0;
      --key-accent: #b91c1c;
      --key-chip-bg: #ffe0e0;
      --key-chip-border: #d4908f;
    }

    * {
      box-sizing: border-box;
    }

    body {
          margin: 0;
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          padding: 32px 20px;
          background: var(--bg);
          color: var(--text);
          font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN",
            "Hiragino Sans", Meiryo, sans-serif;
        }

        .wrapper {
          width: min(540px, 100%);
          display: flex;
          flex-direction: column;
          gap: 20px;
        }

        .header-bar { text-align: center; }

        .teacher-name {
          font-size: 1.05rem;
          font-weight: 600;
          color: var(--muted);
        }

        .status {
          margin-top: 4px;
          font-size: 0.9rem;
          color: var(--muted);
          min-height: 1.4em;
        }

        .info-card {
          border-radius: var(--radius);
          box-shadow: var(--shadow);
          padding: 24px 24px 28px;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 14px;
        }

        .info-card .card-label {
          font-size: 1.15rem;
          font-weight: 800;
          letter-spacing: 0.02em;
          text-align: center;
        }

        .info-card .card-value {
          min-height: 56px;
          display: inline-flex;
          align-items: center;
          padding: 10px 28px;
          border-radius: 12px;
          border-width: 2px;
          border-style: solid;
        }

        .info-card .card-value-text {
          font-size: 2.4rem;
          font-weight: 700;
          letter-spacing: 0.06em;
          line-height: 1.15;
        }

        .card--staff {
          background: var(--staff-bg);
          border: 1.5px solid var(--staff-border);
        }
        .card--staff .card-label { color: var(--staff-accent); }
        .card--staff .card-value {
          background: var(--staff-chip-bg);
          border-color: var(--staff-chip-border);
        }
        .card--staff .card-value-text { color: var(--staff-accent); }

        .card--key {
          background: var(--key-bg);
          border: 1.5px solid var(--key-border);
        }
        .card--key .card-label { color: var(--key-accent); }
        .card--key .card-value {
          background: var(--key-chip-bg);
          border-color: var(--key-chip-border);
        }
        .card--key .card-value-text { color: var(--key-accent); }

        .is-hidden { display: none; }

    }
  </style>
</head>

<body>
  <main class="card" role="main" aria-labelledby="teacherNoTitle">
    <div class="wrapper">
        <div class="header-bar">
          <div id="teacherNameText" class="teacher-name" aria-live="polite">-</div>
          <p id="statusText" class="status" aria-live="polite">読み込み中...</p>
        </div>

        <section class="info-card card--staff" aria-label="職員No表示">
          <div class="card-label">職員No（講師No）</div>
          <div class="card-value">
            <span id="teacherNoValue" class="card-value-text">-</span>
          </div>
        </section>

        <section id="confirmKeyCard" class="info-card card--key is-hidden" aria-label="確認key表示">
          <div class="card-label">出退勤記録 確認key</div>
          <div class="card-value">
            <span id="confirmKeyValue" class="card-value-text">-</span>
          </div>
        </section>
      </div>
  </main>

  <script>
    const ME_API_URL = "/kiweb/teacher-auth/api/me.php";
    const BRIDGE_API_URL = "/kiweb/apis/justdb_teacher_bridge.php";
    const TEACHER_ROLE = "part_time_teacher";
    const STAFF_ROLE = "part_time_staff";

    const statusText = document.getElementById("statusText");
    const teacherNoValue = document.getElementById("teacherNoValue");
    const teacherNameText = document.getElementById("teacherNameText");
    // const confirmKeyGroup = document.getElementById("confirmKeyGroup");
    const confirmKeyCard = document.getElementById("confirmKeyCard");
    const confirmKeyValue = document.getElementById("confirmKeyValue");

    function setStatus(text) {
      if (statusText) {
        statusText.textContent = text;
      }
    }

    function setNumber(value) {
      if (teacherNoValue) {
        teacherNoValue.textContent = value;
      }
    }

    // function setConfirmKey(value) {
    //   if (confirmKeyValue) {
    //     confirmKeyValue.textContent = value;
    //   }
    // }

// 変更後
    function setConfirmKey(value) {
      if (!confirmKeyValue) return;
      const trimmed = String(value).trim();
      if (/^\d{1,3}$/.test(trimmed)) {
        confirmKeyValue.textContent = trimmed.padStart(4, "0");
      } else {
        confirmKeyValue.textContent = trimmed;
      }
    }    

    // function setConfirmKeyVisible(visible) {
    //   if (!confirmKeyGroup) {
    //     return;
    //   }
    //   confirmKeyGroup.classList.toggle("is-hidden", !visible);
    // }
    // 変更後
    function setConfirmKeyVisible(visible) {
      if (!confirmKeyCard) return;
      confirmKeyCard.classList.toggle("is-hidden", !visible);
    }
    function setTeacherName(name) {
      if (!teacherNameText) {
        return;
      }
      const rawName = (name || "").trim();
      if (!rawName) {
        teacherNameText.textContent = "-";
        return;
      }
      const baseName = rawName.replace(/(さん)+$/u, "").trim();
      teacherNameText.textContent = baseName ? `${baseName}さん` : "-";
    }

    async function getCurrentUser() {
      const response = await fetch(ME_API_URL, {
        method: "GET",
        credentials: "include",
        cache: "no-store"
      });
      if (!response.ok) {
        return null;
      }
      const data = await response.json();
      if (!data || !data.success || !data.user) {
        return null;
      }
      return data.user;
    }

    async function getBridgeDataByName(name) {
      const trimmedName = (name || "").trim();
      if (!trimmedName) {
        return null;
      }

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      let response;
      try {
        response = await fetch(
          `${BRIDGE_API_URL}?strName=${encodeURIComponent(trimmedName)}`,
          { method: "GET", cache: "no-store", signal: controller.signal }
        );
      } finally {
        clearTimeout(timeoutId);
      }

      if (!response.ok) {
        return null;
      }

      const data = await response.json();
      if (!data || typeof data !== "object") {
        return null;
      }
      const koshiNo = data.koshiNo !== undefined && data.koshiNo !== null
        ? String(data.koshiNo).trim()
        : "";
      const pin = data.pin !== undefined && data.pin !== null
        ? String(data.pin).trim()
        : "";
      return { koshiNo, pin };
    }

    async function init() {
      setStatus("認証情報を確認中...");
      setNumber("-");
      setConfirmKey("-");
      setConfirmKeyVisible(false);
      setTeacherName("");

      try {
        const user = await getCurrentUser();
        if (!user) {
          setStatus("ログイン状態を確認できませんでした。");
          return;
        }

        const roles = Array.isArray(user.roles) ? user.roles : [];
        const isPartTimeTeacher = roles.includes(TEACHER_ROLE);
        const isPartTimeStaff = roles.includes(STAFF_ROLE);
        if (!isPartTimeTeacher && !isPartTimeStaff) {
          setStatus("この画面は非常勤（講師/講師以外）専用です。");
          return;
        }

        setTeacherName((user.name || "").trim());

        const loginName = (user.name || user.email || "").trim();
        if (!loginName) {
          setStatus("講師名を確認できませんでした。");
          return;
        }

        setStatus("職員No（講師No）と出退勤記録 確認keyを取得中...");
        const bridgeData = await getBridgeDataByName(loginName);
        if (!bridgeData) {
          setStatus("情報を取得できませんでした。");
          return;
        }

        setNumber(bridgeData.koshiNo || "-");
        if (isPartTimeTeacher) {
          setConfirmKeyVisible(true);
          setConfirmKey(bridgeData.pin || "-");
          setStatus("職員No（講師No）と出退勤記録 確認keyを表示しています。");
        } else {
          setConfirmKeyVisible(false);
          setStatus("職員No（講師No）を表示しています。");
        }
      } catch (error) {
        setStatus("通信エラーが発生しました。");
      }
    }

    init();
  </script>
</body>

</html>
