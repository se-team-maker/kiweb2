<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>職員No（講師No）/確認key表示</title>
  <link rel="stylesheet" href="vendor/mdl/mdl-chip.css" />
  <style>
    :root {
      --bg: #fff7f8;
      --surface: #ffffff;
      --border: #e3c4c7;
      --text: #291819;
      --muted: #5c4346;
      --accent: #af1e2b;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 15% 10%, #ffe9ec 0%, var(--bg) 45%, #fff2f4 100%);
      color: var(--text);
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .title-row .title {
      margin: 0;
    }

    .teacher-name {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .status {
      margin: 0 0 18px;
      color: var(--muted);
      min-height: 1.4em;
      font-size: 0.95rem;
    }

    .number-wrap {
      display: grid;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      background: #fffafa;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field + .field {
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
    }

    .label {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .value {
      color: var(--accent);
      line-height: 1.1;
      word-break: break-all;
    }

    .teacher-chip {
      min-height: 48px;
      border: 1px solid #f0b9bf;
      background: #fff1f3;
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
    }

    .teacher-chip .mdl-chip__text {
      color: var(--accent);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .is-hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="card" role="main" aria-labelledby="teacherNoTitle">
    <div class="title-row">
      <h1 id="teacherNoTitle" class="title">職員No（講師No）</h1>
      <span id="teacherNameText" class="teacher-name" aria-live="polite">-</span>
    </div>
    <p id="statusText" class="status" aria-live="polite">読み込み中...</p>
    <section class="number-wrap" aria-label="認証情報表示">
      <div class="field">
        <div class="label">職員No（講師No）</div>
        <div class="value">
          <span class="mdl-chip teacher-chip">
            <span id="teacherNoValue" class="mdl-chip__text">-</span>
          </span>
        </div>
      </div>
      <div id="confirmKeyGroup" class="field is-hidden">
        <div class="label">確認key</div>
        <div class="value">
          <span class="mdl-chip teacher-chip">
            <span id="confirmKeyValue" class="mdl-chip__text">-</span>
          </span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const ME_API_URL = "/kiweb/teacher-auth/api/me.php";
    const BRIDGE_API_URL = "/kiweb/apis/justdb_teacher_bridge.php";
    const TEACHER_ROLE = "part_time_teacher";
    const STAFF_ROLE = "part_time_staff";

    const statusText = document.getElementById("statusText");
    const teacherNoValue = document.getElementById("teacherNoValue");
    const teacherNameText = document.getElementById("teacherNameText");
    const confirmKeyGroup = document.getElementById("confirmKeyGroup");
    const confirmKeyValue = document.getElementById("confirmKeyValue");

    function setStatus(text) {
      if (statusText) {
        statusText.textContent = text;
      }
    }

    function setNumber(value) {
      if (teacherNoValue) {
        teacherNoValue.textContent = value;
      }
    }

    function setConfirmKey(value) {
      if (confirmKeyValue) {
        confirmKeyValue.textContent = value;
      }
    }

    function setConfirmKeyVisible(visible) {
      if (!confirmKeyGroup) {
        return;
      }
      confirmKeyGroup.classList.toggle("is-hidden", !visible);
    }

    function setTeacherName(name) {
      if (!teacherNameText) {
        return;
      }
      const rawName = (name || "").trim();
      if (!rawName) {
        teacherNameText.textContent = "-";
        return;
      }
      const baseName = rawName.replace(/(さん)+$/u, "").trim();
      teacherNameText.textContent = baseName ? `${baseName}さん` : "-";
    }

    async function getCurrentUser() {
      const response = await fetch(ME_API_URL, {
        method: "GET",
        credentials: "include",
        cache: "no-store"
      });
      if (!response.ok) {
        return null;
      }
      const data = await response.json();
      if (!data || !data.success || !data.user) {
        return null;
      }
      return data.user;
    }

    async function getBridgeDataByName(name) {
      const trimmedName = (name || "").trim();
      if (!trimmedName) {
        return null;
      }

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      let response;
      try {
        response = await fetch(
          `${BRIDGE_API_URL}?strName=${encodeURIComponent(trimmedName)}`,
          { method: "GET", cache: "no-store", signal: controller.signal }
        );
      } finally {
        clearTimeout(timeoutId);
      }

      if (!response.ok) {
        return null;
      }

      const data = await response.json();
      if (!data || typeof data !== "object") {
        return null;
      }
      const koshiNo = data.koshiNo !== undefined && data.koshiNo !== null
        ? String(data.koshiNo).trim()
        : "";
      const pin = data.pin !== undefined && data.pin !== null
        ? String(data.pin).trim()
        : "";
      return { koshiNo, pin };
    }

    async function init() {
      setStatus("認証情報を確認中...");
      setNumber("-");
      setConfirmKey("-");
      setConfirmKeyVisible(false);
      setTeacherName("");

      try {
        const user = await getCurrentUser();
        if (!user) {
          setStatus("ログイン状態を確認できませんでした。");
          return;
        }

        const roles = Array.isArray(user.roles) ? user.roles : [];
        const isPartTimeTeacher = roles.includes(TEACHER_ROLE);
        const isPartTimeStaff = roles.includes(STAFF_ROLE);
        if (!isPartTimeTeacher && !isPartTimeStaff) {
          setStatus("この画面は非常勤（講師/講師以外）専用です。");
          return;
        }

        setTeacherName((user.name || "").trim());

        const loginName = (user.name || user.email || "").trim();
        if (!loginName) {
          setStatus("講師名を確認できませんでした。");
          return;
        }

        setStatus("職員No（講師No）と確認keyを取得中...");
        const bridgeData = await getBridgeDataByName(loginName);
        if (!bridgeData) {
          setStatus("情報を取得できませんでした。");
          return;
        }

        setNumber(bridgeData.koshiNo || "-");
        if (isPartTimeTeacher) {
          setConfirmKeyVisible(true);
          setConfirmKey(bridgeData.pin || "-");
          setStatus("職員No（講師No）と確認keyを表示しています。");
        } else {
          setConfirmKeyVisible(false);
          setStatus("職員No（講師No）を表示しています。");
        }
      } catch (error) {
        setStatus("通信エラーが発生しました。");
      }
    }

    init();
  </script>
</body>

</html>
