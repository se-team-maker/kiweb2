<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="pdf-frame-sk" src=""></iframe>
  <iframe id="pdf-frame-en" src=""></iframe>

  <script>
    function reloadPDF() {
      const iframesk = document.getElementById('pdf-frame-sk');
      const iframeen = document.getElementById('pdf-frame-en');

      const timestamp = new Date().getTime(); // キャッシュ回避のための一意の値
      iframesk.src = `room_sk.pdf?ts=${timestamp}`;
      iframeen.src = `room_en.pdf?ts=${timestamp}`;
    }

    // 初回ロード
    reloadPDF();

    // 5分ごとにPDFを再読み込み（300,000ミリ秒 = 5分）
    setInterval(reloadPDF, 300000);
  </script>
</body>
</html>
