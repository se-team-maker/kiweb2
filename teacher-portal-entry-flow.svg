<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">講師ポータル 入口からポータル振り分けまでの流れ</title>
  <desc id="desc">kiweb2.html から .htaccess と portal-guard.php を経由して管理者、専任、非常勤の各ポータルへ振り分けられ、teacher-auth/api/me.php を参照する流れ</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
    <style>
      .bg { fill: #f8f5ef; }
      .title { font: 700 30px 'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif; fill: #1f2933; }
      .box { fill: #fffdf8; stroke: #475569; stroke-width: 2.5; rx: 18; ry: 18; }
      .portal { fill: #eef6ff; stroke: #2563eb; stroke-width: 3; }
      .api { fill: #eefbf1; stroke: #2f855a; stroke-width: 3; }
      .tag { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 12; ry: 12; }
      .label { font: 700 22px 'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif; fill: #1f2933; text-anchor: middle; }
      .small { font: 500 18px 'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif; fill: #4b5563; text-anchor: middle; }
      .tagText { font: 600 16px 'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif; fill: #334155; text-anchor: middle; }
      .line { stroke: #495057; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="820"/>
  <text class="title" x="48" y="58">入口 URL からポータル振り分けまで</text>

  <rect class="box" x="60" y="346" width="280" height="96"/>
  <text class="label" x="200" y="385">/kiweb/kiweb2.html</text>
  <text class="small" x="200" y="418">ポータル入口</text>

  <rect class="box" x="420" y="346" width="230" height="96"/>
  <text class="label" x="535" y="385">.htaccess</text>
  <text class="small" x="535" y="418">rewrite と公開制御</text>

  <rect class="box" x="730" y="346" width="290" height="96"/>
  <text class="label" x="875" y="385">portal-guard.php</text>
  <text class="small" x="875" y="418">ログイン確認とロール判定</text>

  <rect class="box portal" x="1130" y="120" width="250" height="98"/>
  <text class="label" x="1255" y="160">kiweb2-admin.html</text>
  <text class="small" x="1255" y="194">管理者ポータル</text>

  <rect class="box portal" x="1130" y="346" width="250" height="98"/>
  <text class="label" x="1255" y="386">kiweb2-fulltime.html</text>
  <text class="small" x="1255" y="420">専任ポータル</text>

  <rect class="box portal" x="1130" y="572" width="250" height="98"/>
  <text class="label" x="1255" y="612">kiweb2.html</text>
  <text class="small" x="1255" y="646">非常勤ポータル</text>

  <rect class="box api" x="1040" y="726" width="340" height="64"/>
  <text class="label" x="1210" y="768">teacher-auth/api/me.php</text>

  <rect class="tag" x="1000" y="136" width="105" height="62"/>
  <text class="tagText" x="1052" y="160">admin</text>
  <text class="tagText" x="1052" y="183">manage_users のみ</text>

  <rect class="tag" x="990" y="334" width="120" height="36"/>
  <text class="tagText" x="1050" y="357">full_time_teacher</text>

  <rect class="tag" x="965" y="510" width="145" height="86"/>
  <text class="tagText" x="1037" y="535">part_time_teacher</text>
  <text class="tagText" x="1037" y="558">part_time_staff</text>
  <text class="tagText" x="1037" y="581">teacher / student</text>

  <path class="line" d="M340 394 H420"/>
  <path class="line" d="M650 394 H730"/>

  <path class="line" d="M1020 390 C1085 390, 1068 169, 1130 169"/>
  <path class="line" d="M1020 394 H1130"/>
  <path class="line" d="M1020 398 C1085 398, 1068 621, 1130 621"/>

  <path class="line" d="M1255 218 C1255 310, 1110 430, 1110 726"/>
  <path class="line" d="M1255 444 C1255 560, 1210 620, 1210 726"/>
  <path class="line" d="M1255 670 C1255 705, 1310 708, 1310 726"/>
</svg>
